spring.application.name=backend
# Conexion del docker a la BD
spring.datasource.url=jdbc:mysql://localhost:3306/billflow_db?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=8081

# Creaci\ufffdn de las tablas en caso de que no las haya
spring.jpa.hibernate.ddl-auto=update

# Ver los comandos que hace java en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true