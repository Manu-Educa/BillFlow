<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BillFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              charcoal: "#263238",
              teal: "#20B2AA",
              lightbg: "#F0F3F5",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-lightbg flex items-center justify-center h-screen">
    <div
      class="bg-lightbg neu-shadow p-10 rounded-3xl w-full max-auto max-w-sm"
    >
      <div class="text-center mb-10">
        <h2 class="text-3xl font-bold text-charcoal">BillFlow</h2>
        <p class="text-gray-500 mt-2">Inicia sesión para continuar</p>
      </div>
      <form id="loginForm" class="space-y-6">
        <div>
          <label
            class="block text-xs font-semibold text-gray-400 uppercase ml-2 mb-1"
            >Usuario</label
          >
          <input
            type="text"
            id="username"
            class="w-full bg-lightbg neu-search rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-teal/50"
            placeholder="Tu usuario"
          />
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-400 uppercase ml-2 mb-1"
            >Contraseña</label
          >
          <input
            type="password"
            id="password"
            class="w-full bg-lightbg neu-search rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-teal/50"
            placeholder="••••••••"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-teal text-white font-bold py-3 rounded-xl shadow-lg hover:bg-opacity-90 transition-all active:scale-95"
        >
          Entrar
        </button>
      </form>
      <p class="mt-6 text-center text-xs text-gray-400">
  ¿No tienes cuenta? <a href="registro.html" class="text-teal font-bold">Regístrate aquí</a>
</p>
      <div class="mt-8 text-center">
        <a
          href="#"
          class="text-xs text-gray-400 hover:text-teal transition-colors"
          >¿Olvidaste tu contraseña?
        </a>
      </div>
    </div>
    <script src="js/custom-login.js"></script>
  </body>
</html>
