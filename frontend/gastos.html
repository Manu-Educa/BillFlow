<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos - BillFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: '#263238',
            teal: '#20B2AA',
            coral: '#FF7F50',
            lightbg: '#F0F3F5',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-lightbg text-gray-700 flex h-screen overflow-hidden">

<aside class="w-64 bg-charcoal flex flex-col justify-between text-white shadow-xl z-20">
  <div>
    <div class="p-6 flex items-center space-x-3">
      <span class="text-2xl font-bold tracking-wide text-teal">BillFlow</span>
    </div>
    <nav class="mt-6 px-4 space-y-2">
      <a href="index.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span>Inicio</span>
      </a>
      
      <a href="gastos.html" class="flex items-center space-x-3 bg-teal bg-opacity-20 text-teal px-4 py-3 rounded-xl font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
        <span>Gastos</span>
      </a>
      
      <a href="#" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span>Presupuesto</span>
      </a>
      
      <a href="#" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        <span>Reportes</span>
      </a>
    </nav>
  </div>
  <div class="p-4 mb-4">
    <select class="w-full bg-gray-800 text-gray-300 text-sm rounded-lg p-2.5 border border-gray-700 focus:ring-green-500 focus:border-green-500">
        <option>Abril 2026</option>
        <option>Mayo 2026</option>
    </select>
  </div>
</aside>

<main class="flex-1 flex flex-col h-screen overflow-y-auto relative">
  <header class="h-20 px-10 flex items-center justify-between bg-lightbg z-10 border-b border-gray-200">
    <h1 class="text-2xl font-bold text-gray-800">Mis Gastos</h1>
    
    <div class="relative">
      <button id="perfil-btn" class="flex items-center space-x-4 focus:outline-none hover:bg-gray-200 p-2 rounded-lg transition cursor-pointer">
        <span id="display-nombre" class="font-medium text-sm text-charcoal">Usuario Activo</span>
        <div id="display-iniciales" class="w-10 h-10 rounded-full bg-teal flex items-center justify-center text-white font-bold pointer-events-none">
          UA
        </div>
      </button>

      <div id="perfil-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg py-2 z-50 border border-gray-100">
        <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-teal hover:bg-opacity-10 hover:text-teal transition">
          Editar perfil
        </a>
        <hr class="my-1 border-gray-100">
        <button id="logout-btn" class="w-full text-left block px-4 py-2 text-sm text-coral hover:bg-red-50 transition">
          Cerrar sesión
        </button>
      </div>
    </div>
  </header>

  <div class="p-10 pt-8 flex-1">
    <div class="flex justify-between items-center mb-8">
      <div class="relative w-72">
        <input type="text" id="buscar-gasto" placeholder="Buscar gasto..." class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-teal bg-white neu-shadow">
        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <button id="btn-nuevo-gasto" class="bg-teal hover:bg-opacity-90 text-white font-semibold py-2 px-6 rounded-xl transition shadow-lg flex items-center">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Nuevo Gasto
      </button>
    </div>

    <div class="bg-white rounded-2xl neu-shadow overflow-hidden">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100 text-gray-500 text-sm uppercase tracking-wider">
            <th class="p-4 font-medium">Concepto</th>
            <th class="p-4 font-medium">Categoría</th>
            <th class="p-4 font-medium">Fecha</th>
            <th class="p-4 font-medium text-right">Cantidad</th>
            <th class="p-4 font-medium text-center">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-gastos" class="divide-y divide-gray-100">
        </tbody>
      </table>
    </div>
  </div>

  <div id="modal-gasto" class="hidden fixed inset-0 bg-charcoal bg-opacity-50 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl transform scale-100">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Registrar Nuevo Gasto</h2>
      <form id="form-gasto" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Concepto</label>
          <input type="text" id="gasto-concepto" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal focus:outline-none">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Cantidad (€)</label>
            <input type="number" step="0.01" id="gasto-cantidad" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal focus:outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha</label>
            <input type="date" id="gasto-fecha" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal focus:outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
          <select id="gasto-categoria" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal focus:outline-none bg-white">
  <option value="1">Alimentación</option>
  <option value="2">Transporte</option>
  <option value="3">Vivienda</option>
  <option value="4">Ocio</option>
  <option value="5">Salud</option>
  <option value="6">Otros</option>
</select>
        </div>

        <div class="flex justify-end space-x-3 mt-8 pt-4">
          <button type="button" id="btn-cancelar" class="px-5 py-2 text-gray-500 hover:bg-gray-100 rounded-xl font-medium transition">Cancelar</button>
          <button type="submit" class="px-5 py-2 bg-teal text-white hover:bg-opacity-90 rounded-xl font-medium transition shadow-md">Guardar Gasto</button>
        </div>
      </form>
    </div>
  </div>
</main>

<script src="js/gastos.js"></script>
</body>
</html>
