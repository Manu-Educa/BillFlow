<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuesto Familiar - BillFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { charcoal: '#263238', teal: '#20B2AA', coral: '#FF7F50', lightbg: '#F0F3F5' } } }
    }
  </script>
</head>
<body class="bg-lightbg text-gray-700 flex h-screen overflow-hidden">

<aside class="w-64 bg-charcoal flex flex-col justify-between text-white shadow-xl z-20">
  <div>
    <div class="p-6 flex items-center space-x-3">
      <span class="text-2xl font-bold tracking-wide text-teal">BillFlow</span>
    </div>
    <nav class="mt-6 px-4 space-y-2">
      <a href="index.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span>Inicio</span>
      </a>
      
      <a href="gastos.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
        <span>Gastos</span>
      </a>
      
      <a href="presupuestos.html" class="flex items-center space-x-3 bg-teal bg-opacity-20 text-teal px-4 py-3 rounded-xl font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span>Presupuesto</span>
      </a>
      
      <a href="resumen-mes.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        <span>Resumen del Mes</span>
      </a>
      <a href="suscripciones.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        <span>Suscripciones Fijas</span>
      </a>
    </nav>
  </div>
</aside>

<main class="flex-1 flex flex-col h-screen overflow-y-auto">
  <header class="h-20 px-10 flex items-center justify-between bg-lightbg z-10 border-b border-gray-200">
    <h1 class="text-2xl font-bold text-gray-800">Presupuesto Familiar</h1>
  </header>

  <div class="p-10 pt-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="bg-white rounded-2xl p-8 neu-shadow">
      <h2 class="text-xl font-bold text-gray-800 mb-6">Configurar Límite Mensual</h2>
      <form id="form-presupuesto" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Límite de Gasto Máximo (€)</label>
          <input type="number" id="input-limite" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal focus:outline-none text-lg font-bold text-teal" required>
        </div>
        <button type="submit" class="w-full py-3 bg-teal text-white rounded-xl font-bold hover:bg-opacity-90 transition">Guardar Presupuesto</button>
      </form>
    </div>

    <div class="bg-white rounded-2xl p-8 neu-shadow">
      <h2 class="text-xl font-bold text-gray-800 mb-6">Ingresos Familiares</h2>
      <form id="form-ingreso" class="space-y-4 mb-6">
        <div class="flex space-x-4">
          <input type="text" id="input-miembro" placeholder="Nombre (Ej. María)" class="flex-1 px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal focus:outline-none" required>
          <input type="number" id="input-nomina" placeholder="Nómina (€)" class="w-32 px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal focus:outline-none" required>
          <button type="submit" class="px-4 py-2 bg-charcoal text-white rounded-xl font-medium hover:bg-gray-800 transition">Añadir</button>
        </div>
      </form>
      <div id="lista-familia" class="space-y-3">
      </div>
      <div class="mt-6 pt-4 border-t border-gray-100 flex justify-between items-center">
        <span class="font-bold text-gray-600">Total Ingresos Familiares:</span>
        <span id="total-ingresos" class="text-xl font-bold text-teal">€ 0.00</span>
      </div>
    </div>
  </div>
</main>

<script src="js/custom-presupuestos.js"></script>
</body>
</html>
