<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    tailwind.config = {
      theme: { extend: { colors: { charcoal: '#263238', teal: '#20B2AA', coral: '#FF7F50', lightbg: '#F0F3F5' } } }

</head>

  <div>
    <div class="p-6 flex items-center space-x-3">
      <span class="text-2xl font-bold tracking-wide text-teal">BillFlow</span>
    </div>
    <nav class="mt-6 px-4 space-y-2">
      <a href="index.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span>Inicio</span>
      </a>
      <a href="gastos.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
        <span>Gastos</span>
      </a>
      <a href="presupuestos.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span>Presupuesto</span>
      </a>
      <a href="resumen-mes.html" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white transition-colors font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        <span>Resumen del Mes</span>
      </a>
      <a href="suscripciones.html" class="flex items-center space-x-3 bg-teal bg-opacity-20 text-teal px-4 py-3 rounded-xl font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        <span>Suscripciones Fijas</span>
      </a>
    </nav>
  </div>
</aside>

<main class="flex-1 flex flex-col h-screen overflow-y-auto relative">
  <header class="h-20 px-10 flex items-center justify-between bg-lightbg z-10 border-b border-gray-200">
    <h1 class="text-2xl font-bold text-gray-800">Mis Suscripciones</h1>
    <button id="btn-nueva-suscripcion" class="bg-teal text-white font-semibold py-2 px-6 rounded-xl transition shadow-lg">Añadir Suscripción</button>
  </header>

  <div class="p-10 pt-8 flex-1">
    <div id="contenedor-suscripciones" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>
  </div>

  <div id="modal-suscripcion" class="hidden fixed inset-0 bg-charcoal bg-opacity-50 z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Nueva Suscripción</h2>
      <form id="form-suscripcion" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Servicio (Ej. Netflix)</label>
          <input type="text" id="sus-concepto" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-teal">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Coste (€)</label>
            <input type="number" step="0.01" id="sus-importe" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-teal">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Día de cobro</label>
            <input type="number" min="1" max="31" id="sus-dia" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-teal">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
          <select id="sus-categoria" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-teal bg-white">
            <option value="4">Ocio / Streaming</option>
            <option value="3">Vivienda / Internet</option>
            <option value="5">Salud / Gimnasio</option>
            <option value="6">Otros</option>
          </select>
        </div>
        <div class="flex justify-end space-x-3 mt-8 pt-4">
          <button type="button" id="btn-cancelar-sus" class="px-5 py-2 text-gray-500 hover:bg-gray-100 rounded-xl font-medium">Cancelar</button>
          <button type="submit" class="px-5 py-2 bg-teal text-white rounded-xl font-medium shadow-md">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</main>

<script src="js/custom-suscripciones.js"></script>
</body>
</html>
